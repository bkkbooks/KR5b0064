body:
  text: 洞玄靈寳道要經道言大道幽虛寂寥無名孝出於無乗元受生生形法孝無名曰道處於無上玄應無下名行髙遠利益弘大神通無礙不終不始故名孝道有形之類非道不生非孝不成故大道生元氣元氣生太極太極生天地天地生萬物萬物之類人居其長萬靈之中大道最尊仁孝尊道故名孝道道爲萬物父亦名萬物母又曰道生一一生二二生三三生萬物萬物得道則昌失道則亾精微柔弱忍辱慈孝進修中道心無懈倦以孝自牧上報元恩玄父玄母二親大恩二親大恩故名行孝行孝道也心出於虛道入於無虛無相感不動而應應則道成成孝道也故虛心以待物物亦虛心以待之彼此相待然後神交先通其神後通其身身神俱通則孝道成矣出有入無分形百億無所不宅在天爲天靈在地爲地祗天靈地祇二景之根精也晨夕輪照養育含生在東主九夷在南主八蠻在西主六戎在北主五狄在中主三泰雖邊邦雜類之種水陸行藏之族悉皆賴道而得受生母以慈養子以孝生生成之日定有反哺蟲鳥之心猶知報恩五逆之人不如禽獸不行孝道背叛元恩是名凶人非君子也不名道士是眞罪鬼凡百人倫不行孝道見善不從聞道不信道猶慈恩元元不捨方便示現種種神變與其幽驗不能用之是名蠹尸蠹敗之尸亦如妬媿守尸之精住其身中爾時高明眞王而作頌曰勿言孝不眞勿言道不神行孝光天下明然照爾心心迷暗不悟躊躇失生路𠮷㑹考勲名無功終不度天堂寂不歡地獄多寒沍語汝儀堂子勤建仙眞歩莫學蠹死羣灰身螻蟻聚一墮浮遊鬼萬劫忘生路湯炭罪未窮茫范守丘墓爾時眞王作此頌巳俛而彈指聲聞十八湯炭地獄六宮罪門又作苦頌曰天堂永不閉地獄未曾開受苦無休息罪鬼合羣來渴則飲鑊湯飢則食熱灰由何失孝道財色受殃媒強壯不行道臨終始欲迴聞孝翻誹笑湯火長悲哀於是眞王作此頌巳放心孝光洞朗天下光變成燈照耀十八大地積夜之獄眞王慈氣化成仙雲五色徧覆十方無極世界是諸罪鬼一時放赦洗沐玄津升於鳳階禮悔首過歡喜慶泰而作歌曰六宫除罪目九幽無對䰟天燈朗暗室稽首禮玄門三官不受事長歸帝一尊爾時罪鬼作此歌巳未得受生復歸丘墓夕夕通夢語其子孫曰欲得存亾如願急然九幽神香建立精舍盛施牀座精心行道慈救萬物香燈願念報二親恩報大道恩轉誦經教助國扶命救濟孤危療治疾疫守一立功勸人作善是時凡人感通此夢睡中鷙悟各見庭中天燈照明光芒射心皆悉㝠悟行孝奉道一十八年得六通果是其先亾南宫受化皆生福地見道聞法並登仙位道言道德弘大孝攝幽明罪鬼蒙赦而行道子孫㝠悟而行孝奉吾道者先當行孝而後行道故名孝道徃昔有人先行道而後行孝道無生滅人有始終行道道行未成欲孝而親不待爲不待故則有伏哀之慟傷和損氣不名益易年過四十衰相表現守一遂廢心喪不終及年六十伏尸塚間積經三年形神不散靈禽翼覆猛獸衛護以七月七日立秋之節太一天尊俯而愍之後至秋分遣一仙使齋持瓊丹下而救之入口便活猶如睡覺西宮八王給其飈輪上升天府號曰孝仙于今夀九萬大劫形如金玉氣色似雲出死人生長存無窮孝仙初始備嬰塗炭風霜不改飢惱無變道貴丹成高尚其志懷贞抱節然後獲果坐命雲車飛浮上界于今行孝憶想二親元元大恩使我成道不可思議徃昔劫中有一人先行至孝二親俱壽一百三十七嵗子年巳登一百五嵗善明方藥常餌丹光父母并子筋力不衰於是孝子被服綵衣又善音樂一日二時歌舞作樂是時父母一旦終亾如人睡卧身不痛惱心志不亂孝子結塋舉殯二親鳥獸雲集助其銜土積經三年墳髙百尺於是孝子結廬九載行孝修道天下神燭以明其心香官燌嬰以爲道信天地父母感其精志賜其交黎升入西宫錫號全光孝子明玉眞童老而成道于今反嬰雖得道眞不忘孝道况於凡夫忘恩背義仁德不行與尸何别反逆天地躭淫嗜酒貪財無義利己害物生啖魚肉膏血洿口通體膻腥信用邪魅或爲利出家詐云奉道毀損功德竊取法財貿易酒色不知厭足臨死求哀罪目巳定生神不居志意悶亂氣冷色變徙有悔心道不原赦䰟𩲸離散處處受苦肉食螻蟻骨肉和土五內糜爛無復人形語汝來生欲奉孝道勤誦經誠諦觀身心斷諸貪著旣斷貪著即無煩惱煩惱因縁因貪慾生若斷貪慾生死攀縁永絶無餘身心快樂道心弘廣七祖介福何但一身而成道耶孝道神力譬如天地天地所生無種所有唯有二親不可假作應當行孝以報大恩應當修道齋戒拔度燒香然燈以濟苦厄七祖在難希望子姪請道神力冀得解脫如人囚禁枷鎖繫縛望逢恩赦蕩除罪咎快樂自在心無憂慮㝠陽罪目大同小異有罪逢赦不如無罪有罪雖免其目猶在旣失一行終身無言故生不可失道不可忘忘道失生是名罪鬼不名人也忘道失生随境而舍展轉無窮如汎大海不識邊際思歸舊島風浪所漂永失來路央生道者亦復如是及其強徤難事巳辦何不行孝修無上道永斷生死煩惱因縁道言聞吾道者爲賢人行吾道者爲眞人爾時仙王而作頌曰欲知孝道隆滿堂皆女僮窈窕西宫室承運補王公此時吾道行天燈處處明神香迴朗識山野慶雲生敵國罷鬬戰四海不交兵能修孝道誠斯須見太平道言道不修人人須修道道本自然不修人道人非自然故應精進修自然道三萬六千道要要以孝道爲宗未有不慈不孝反逆父母殺害君主而得成道不忠不孝名十惡人生犯王法死入地獄生死受考無有出期得餓鬼道道言至孝修道修孝道也道在至孝不孝非道也何以故孝能慈悲孝能忍辱孝能精進孝能勤苦孝能堅正孝能降伏一切魔事財色酒肉名聞榮位傾奪爭競交兵殺害至孝之士泯然無心守一不動一切魔事自然消伏孝堅金開閉揵死道是諸魔奸津梁斷絕内外寂靜専行孝道内無交兵外無伏賊孝道無形不可取相孝道弘大不可捨相取捨無相眞應動用如無盡藏無盡藏故無取無捨有取有捨則有窮有怠窮則非道怠則非孝不窮不怠是名孝道孝如噓吸氣不可停停氣則身滅停孝則道敗喘息繼念行住憶想故念念在心不可放捨放捨則道敗故不可捨也道言來生男女欲求孝道莫爲利求莫爲色求利生癡貪癡貪非道色生嫉妬一切苦縁因色滋長嫉妬非德苦縁非道色心求道道不可得道非祭祀不可以酒肉求道本清潔不可以穢慢求孝道無心不可以智慧求大道無形不可以色相求夫求道者應以無得心求亦不前心求亦不後心求應以不起不滅心求應以祕宻心求應以廣大心求應以質直心求應以忍辱精進心求應以寂静柔弱心求應以慈悲至孝心求略舉道要以類推之乆自明矣爾時眞王爲諸來生略説道要流通供養有得之者晨夕誦念精修其事心得成道不可思議洞玄靈寳道要經
